<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사이버 돌탑도 소원을 이루어 줄까</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #f4f3f1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif; }
  #wrap { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; }

  /* 우측 상단 ? 버튼 */
  .help-btn { position: absolute; top: 26px; right: 28px; width: 38px; height: 38px; border: 1.5px solid #bbb; background: transparent; color: #888; font-size: 16px; font-weight: 600; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .14s ease; pointer-events: auto; }
  .help-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }

  /* 안내 팝오버 */
  .popover { position: absolute; top: 74px; right: 28px; background: #fff; border: 1px solid #e2e1de; border-radius: 8px; padding: 20px 24px; box-shadow: 0 8px 30px rgba(0,0,0,.10); opacity: 0; transform: translateY(-6px); pointer-events: none; transition: opacity .18s ease, transform .18s ease; max-width: 300px; }
  .popover.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .popover .en-block { font-size: 13px; color: #1a1a1a; line-height: 1.7; letter-spacing: .2px; margin-bottom: 14px; }
  .popover .ko-block { font-size: 13px; color: #1a1a1a; line-height: 1.7; }

  /* 우측 하단 검은 원 리셋 */
  .reset { position: absolute; bottom: 30px; right: 30px; width: 42px; height: 42px; border: none; background: #1a1a1a; color: #fff; font-size: 19px; line-height: 1; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform .25s ease, background .14s ease; pointer-events: auto; }
  .reset:hover { background: #000; transform: rotate(-130deg); }
  .reset:active { transform: rotate(-130deg) scale(.9); }
</style>
</head>
<body>
<div id="wrap">
  <button class="help-btn" id="help" aria-label="도움말">?</button>
  <div class="popover" id="popover">
    <div class="en-block">Press the spacebar to drop a stone<br>and build your tower.</div>
    <div class="ko-block">스페이스 바를 눌러 돌을 생성하고<br>돌탑을 쌓아봐요.</div>
  </div>
  <button class="reset" id="reset" aria-label="리셋">↺</button>
</div>

<script>
const { Engine, Render, Runner, World, Bodies, Body, Composite, Mouse, MouseConstraint, Events, Common } = Matter;

// 오목한 돌 외곽선을 정확히 충돌처리하기 위해 poly-decomp 등록
if (window.decomp) Common.setDecomp(window.decomp);

const engine = Engine.create();
engine.gravity.y = 1;
const world = engine.world;
let W = window.innerWidth, H = window.innerHeight;

const wrap = document.getElementById('wrap');
const render = Render.create({
  element: wrap, engine: engine,
  options: { width: W, height: H, wireframes: false, background: '#f4f3f1', pixelRatio: window.devicePixelRatio || 1 }
});
Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// 바닥과 양옆 벽
let ground, leftW, rightW;
function buildBounds() {
  if (ground) World.remove(world, [ground, leftW, rightW]);
  const groundY = H;  // 화면 맨 아래
  // 보이지 않는 바닥: 돌이 받쳐지되 그림은 안 보임
  ground = Bodies.rectangle(W/2, groundY + 25, W*2, 50, { isStatic: true, render: { visible: false } });
  leftW  = Bodies.rectangle(-25, H/2, 50, H*2, { isStatic: true, render: { visible: false } });
  rightW = Bodies.rectangle(W+25, H/2, 50, H*2, { isStatic: true, render: { visible: false } });
  World.add(world, [ground, leftW, rightW]);
  return groundY;
}
let groundY = buildBounds();

// 이미지 미리 로드
const imgCache = {};
ROCKS.forEach((r, i) => { const im = new Image(); im.src = r.img; imgCache[i] = im; });

// 떨어진 돌 추적 (이미지 렌더용)
const stones = [];

// 가방(셔플 백) 방식: 28개를 한 번씩 다 쓰고 다시 섞음.
// → 모든 돌이 골고루, 한 바퀴 안에서는 중복 없이 나옴.
let bag = [];
let lastIdx = -1;
function nextRockIdx() {
  if (bag.length === 0) {
    bag = ROCKS.map((_, i) => i);
    // Fisher-Yates 셔플
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
    // 새 바구니 첫 돌이 직전 바구니 마지막 돌과 같으면 살짝 섞어 연속 방지
    if (lastIdx !== -1 && bag[bag.length - 1] === lastIdx && bag.length > 1) {
      [bag[bag.length - 1], bag[bag.length - 2]] = [bag[bag.length - 2], bag[bag.length - 1]];
    }
  }
  const idx = bag.pop();
  lastIdx = idx;
  return idx;
}

function dropStone() {
  const idx = nextRockIdx();
  const r = ROCKS[idx];

  // 원본 비율 그대로 사용 (크기 랜덤 없음)
  const sizeMul = 1;

  // 중심정렬된 vertices 만들기 (이미지 좌상단 기준 → 중심 기준)
  const cx = r.w / 2, cy = r.h / 2;
  const verts = r.verts.map(p => ({ x: (p[0] - cx) * sizeMul, y: (p[1] - cy) * sizeMul }));

  const x = W/2 + Common.random(-W*0.18, W*0.18);
  const body = Bodies.fromVertices(x, -80, [verts], {
    density: 0.0011,
    friction: 0.95,
    frictionStatic: 1.4,
    restitution: 0.01,
    render: { visible: false }   // 물리바디는 숨기고 이미지로 그림
  }, true);

  if (!body) return;

  // 데이터에 기록된 무게중심 오프셋(ox,oy)을 크기배율만큼 스케일.
  // fromVertices가 body.position을 무게중심에 두므로,
  // 이미지를 이 오프셋만큼 보정해 그리면 그림과 충돌영역이 정렬됨.
  const offX = (r.ox || 0) * sizeMul;
  const offY = (r.oy || 0) * sizeMul;

  Body.setAngle(body, Common.random(-0.35, 0.35));

  const dispW = r.w * sizeMul;
  const dispH = r.h * sizeMul;
  body.plugin = { imgIdx: idx, dispW, dispH, offX, offY };
  World.add(world, body);
  stones.push(body);
}

// 커스텀 렌더: 각 돌 위에 PNG 이미지를 회전·위치 맞춰 그림
Events.on(render, 'afterRender', () => {
  const ctx = render.context;
  for (const b of stones) {
    const im = imgCache[b.plugin.imgIdx];
    if (!im || !im.complete) continue;
    ctx.save();
    ctx.translate(b.position.x, b.position.y);
    ctx.rotate(b.angle);
    // 무게중심-기하중심 오프셋을 회전 좌표계에서 보정
    ctx.drawImage(im, -b.plugin.dispW/2 + b.plugin.offX, -b.plugin.dispH/2 + b.plugin.offY, b.plugin.dispW, b.plugin.dispH);
    ctx.restore();
  }
});

// 마우스 조작
const mouse = Mouse.create(render.canvas);
const mc = MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
World.add(world, mc);
render.mouse = mouse;

// 입력
function triggerDrop() { dropStone(); }
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); triggerDrop(); }
  else if (e.key === '1' || e.key === '2' || e.key === '3') { triggerDrop(); }
});

// ? 도움말 팝오버 토글
const helpBtn = document.getElementById('help');
const popover = document.getElementById('popover');
helpBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  popover.classList.toggle('open');
});
// 바깥 클릭 시 닫기
document.addEventListener('click', (e) => {
  if (!popover.contains(e.target) && e.target !== helpBtn) popover.classList.remove('open');
});

// 리셋
document.getElementById('reset').addEventListener('click', () => {
  for (const b of stones) World.remove(world, b);
  stones.length = 0;
  bag = [];          // 가방 초기화 → 다시 골고루
  lastIdx = -1;
});

// 화면 아래로 완전히 빠진 돌 정리
Events.on(engine, 'afterUpdate', () => {
  for (let i = stones.length - 1; i >= 0; i--) {
    if (stones[i].position.y > H + 400) {
      World.remove(world, stones[i]);
      stones.splice(i, 1);
    }
  }
});

// 리사이즈 대응
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  render.canvas.width = W; render.canvas.height = H;
  render.options.width = W; render.options.height = H;
  Render.setPixelRatio(render, window.devicePixelRatio || 1);
  groundY = buildBounds();
});
</script>
